name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyqt6 pyinstaller

      - name: Build MLQ EXE
        run: |
          pyinstaller --onefile --windowed --name "MLQ-Scheduler" Mlq.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MLQ-Scheduler-App
          path: dist/*
